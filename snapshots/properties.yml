snapshots:
  - name: customers_snapshot
    relation: source('ecomm', 'customers')
    config:
      unique_key: id
      strategy: check
      check_cols: all
      schema: snapshots
  - name: orders_snapshot 
    relation: source('ecomm', 'orders')
    config: 
      unique_key: id 
      strategy: timestamp 
      updated_at: created_at
      schema: snapshots 

  