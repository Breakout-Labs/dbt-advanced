version: 2

models:
  - name: orders
    config:
      snowflake_warehouse: "TRANSFORMING_S"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: delivery_time_from_collection
        tests:
          - greater_than_zero
      - name: delivery_time_from_order
        tests:
          - greater_than_zero
