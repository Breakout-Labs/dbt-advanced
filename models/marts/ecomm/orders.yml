version: 2

models:
  - name: orders
    versions:
      - v: 1
    config:
      contract:
        enforced: false
    description: "This is the orders model for our training"
    columns:
      - name: pk_orders
        constraints:
          - type: primary_key
        tests:
          - unique
        data_type: varchar
        description: "surrogate primary key"

      - name: hk_customer
        data_type: varchar
        description: "hashed fk"

      - name: source_last_updated
        data_type: timestamp_ntz
        description: "Last run of ETL pipeline"

      - name: last_updated
        data_type: timestamp_ltz
        description: "When this table was last updated"

      - name: order_id
        tests:
          - unique
          - not_null
        data_type: varchar
        description: ""

      - name: customer_id
        data_type: number
        description: ""

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: delivery_time_from_order
        tests:
          - greater_than_zero
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        tests:
          - greater_than_zero
        data_type: number
        description: ""
