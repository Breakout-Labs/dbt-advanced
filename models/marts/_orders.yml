version: 2

models:

  - name: orders
    versions:
      - v: 1
    config:
        contract:
          enforced: true
    description: "Summary of delivered orders per customer"
    columns:
      - name: pk_orders
        constraints:
        - type: primary_key
        data_type: varchar
        description: "Order ID"
        data_tests:
          - unique
          - not_null

      - name: hk_customer
        data_type: varchar
        description: "Customer ID"

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status_normalized
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: store_name
        data_type: varchar
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""
        data_tests:
          - greater_than_zero

      - name: delivery_time_from_collection
        data_type: number
        description: ""
        data_tests:
          - greater_than_zero

      - name: days_since_last_order
        data_type: number
        description: "Number of days since the customer placed the last order"

      - name: source_last_updated
        data_type: timestamp_ntz
        description: ""

      - name: last_updated
        data_type: timestamp_ltz
        description: ""