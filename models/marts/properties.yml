version: 2

models:

  - name: stg_ecomm__orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: store_id
        tests:
          - not_null
          
  - name: customers
    description: Each record represents a customer.
    columns:
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: A customer's first name.
      - name: last_name
        description: A customer's last name.
      - name: count_orders
        description: The number of orders a customer has had all-time.
      - name: first_order_at
        description: The timestamp of a customer's first order.
      - name: most_recent_order_at
        description: The timestamp of a customer's most recent order.
      - name: average_delivery_time_from_collection
        description: The average time in minutes from order collection to delivery.
        data_tests:
          - greater_than_zero
      - name: average_delivery_time_from_order
        description: The average time in minutes from order placement to delivery.
        data_tests:
          - greater_than_zero
      - name: email
        description: The email address of the customer.
      - name: address
        description: The physical address of the customer.
      - name: phone_number
        description: The contact phone number of the customer.
      - name: created_at
        description: The timestamp when the customer record was created.
      - name: satisfaction_score
        description: The score representing the customer's satisfaction level from survey responses.
      - name: survey_date
        description: The date when the customer survey was conducted.
      - name: count_orders_last_30_days
        description: The number of orders placed by the customer in the last 30 days.
      - name: count_orders_last_90_days
        description: The number of orders placed by the customer in the last 90 days.
      - name: count_orders_last_360_days
        description: The number of orders placed by the customer in the last 360 days.

        
  - name: orders
    versions:
      - v: 1
    config:
      contract:
        enforced: true
    description: ""
    columns:
      - name: pk_orders
        description: Primary key for the orders model.
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique
        

      - name: hk_customer
        description: Hash key for identifying the customer associated with the order.
        data_type: varchar
        

      - name: order_id
        description: Unique identifier for each order.
        data_type: varchar
        

      - name: customer_id
        description: Identifier for the customer who placed the order.
        data_type: number
        

      - name: ordered_at
        description: Timestamp indicating when the order was placed.
        data_type: timestamp_ntz
        

      - name: total_amount
        description: Total monetary value of the order.
        data_type: float
        

      - name: source_last_updated
        description: Timestamp of the most recent update from the source systems.
        data_type: timestamp_ntz
        

      - name: store_name
        description: Name of the store where the order was placed.
        data_type: varchar
        

      - name: days_since_last_order
        description: Number of days since the customer's last order.
        data_type: number
        

      - name: delivery_time_from_order
        description: Time in minutes from when the order was placed to when it was delivered.
        data_type: number
        

      - name: delivery_time_from_collection
        description: Time in minutes from when the order was picked up to when it was delivered.
        data_type: number
        

      - name: last_updated
        description: Timestamp of the last update to the record.
        data_type: timestamp_ltz
        

