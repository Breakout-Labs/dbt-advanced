version: 2

models:
  - name: customers
    description: Each record represents a customer.
    columns:
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        tests:
          - unique
          - not_null
      - name: first_name
        description: A customer's first name.
      - name: last_name
        description: A customer's last name.
      - name: count_orders
        description: The number of orders a customer has had all-time.
      - name: first_order_at
        description: The timestamp of a customer's first order.
      - name: most_recent_order_at
        description: The timestamp of a customer's most recent order.
      - name: average_delivery_time_from_collection
        tests:
          - greater_than_zero
      - name: average_delivery_time_from_order
        tests:
          - greater_than_zero
# Order model with primary key and hash key.
  - name: orders
    versions:
      - v: 1
    config:
      contract:
        enforced: true
    description: "orders table"
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: customer_id
        data_type: number
        description: ""

      - name: store_id
        data_type: number
        description: ""

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: store_name
        data_type: varchar
        description: ""

      - name: orders_synced_at
        data_type: timestamp_ntz
        description: ""

      - name: deliveries_synced_at
        data_type: timestamp_ntz
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        data_type: number
        description: ""

      - name: days_since_last_order
        data_type: number
        description: ""

      - name: pk_orders # takes order_id and uses it as primary key
        constraints:
          - type: primary_key
        tests:
          - unique
        data_type: varchar
        description: "takes order_id and uses it as primary key"

      - name: hk_customer # takes customer_id and uses it as foreign key for association with customers table
        data_type: varchar
        description: "takes customer_id and uses it as foreign key for association with customers table"

      - name: last_updated
        data_type: timestamp_ltz
        description: ""

      - name: source_last_updated
        data_type: timestamp_ntz
        description: ""

