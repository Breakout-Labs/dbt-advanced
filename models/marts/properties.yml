version: 2

models:
  - name: customers
    description: Each record represents a customer.
    columns:
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        tests:
          - unique
          - not_null
      - name: first_name
        description: A customer's first name.
      - name: last_name
        description: A customer's last name.
      - name: count_orders
        description: The number of orders a customer has had all-time.
      - name: first_order_at
        description: The timestamp of a customer's first order.
      - name: most_recent_order_at
        description: The timestamp of a customer's most recent order.
      - name: average_delivery_time_from_collection
        tests:
          - greater_than_zero
      - name: average_delivery_time_from_order
        tests:
          - greater_than_zero


  - name: orders
    versions:
      - v: 1
    description: "The model contains the cleaned orders of Shopify"
    config:
      snowflake_warehouse: 'TRANSFORMING_S'
      contract:
        enforced: true
    columns:
      - name: pk_orders
        data_type: varchar
        constraints:
        - type: primary_key
        description: "Primary key of the orders based on order id"
        tests:
          - unique
          - not_null

      - name: hk_customer
        data_type: varchar
        description: "Foreign costumer key"

      - name: source_last_updated
        data_type: timestamp_ntz
        description: "Last update of the data source"

      - name: last_updated
        data_type: timestamp_ltz
        description: "Last update of the table"

      - name: order_id
        data_type: varchar
        description: "ID of the order"

      - name: customer_id
        data_type: number
        description: "ID of the customer"

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: store_name
        data_type: varchar
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        data_type: number
        description: ""