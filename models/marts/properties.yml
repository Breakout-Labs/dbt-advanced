version: 2

models:
  - name: orders
    description: ""
    versions:
      - v: 1
    config:
      contract:
        enforced: true

    columns:
      - name: pk_orders
        description: "Unique primary key of the table based on the order_id"
        data_type: varchar
        constraints:
          - type: primary_key
        tests:
          - unique

      - name: hk_customer
        data_type: varchar
        description: "Foreign key for the customer based on the customer_id"

      - name: order_id
        data_type: varchar
        description: ""

      - name: customer_id
        data_type: number
        description: ""

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: store_name
        data_type: varchar
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        data_type: number
        description: ""

      - name: source_last_updated
        data_type: timestamp_ntz
        description: "Latest ingestion timestamp from all included sources per record"

      - name: last_updated
        data_type: timestamp_ltz
        description: "Current timestamp of the table"
