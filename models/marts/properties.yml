version: 2

models:
  - name: customers
    description: Each record represents a customer.
    columns:
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        tests:
          - unique
          - not_null
      - name: first_name
        description: A customer's first name.
      - name: last_name
        description: A customer's last name.
      - name: count_orders
        description: The number of orders a customer has had all-time.
      - name: first_order_at
        description: The timestamp of a customer's first order.
      - name: most_recent_order_at
        description: The timestamp of a customer's most recent order.
      - name: average_delivery_time_from_collection
        tests:
          - greater_than_zero
      - name: average_delivery_time_from_order
        tests:
          - greater_than_zero

  - name: stg_ecomm__orders
    columns:
      - name: order_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null

  - name: orders
    versions:
      - v: 1
    config:
      contract:
        enforced: true
    description: "Orders Table Description"
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: pk_orders
        constraints:
         - type: primary_key
        data_type: varchar
        description: "Primary key for orders_id"
        tests: 
          - not_null
          - unique

      - name: customer_id
        data_type: number
        description: ""

      - name: hk_customer
        data_type: varchar
        description: "HK for customer_id"
        tests: 
          - not_null
        

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        data_type: number
        description: ""

      - name: source_last_updated
        data_type: timestamp_ntz
        description: ""

      - name: last_updated
        data_type: timestamp_ltz
        description: ""


