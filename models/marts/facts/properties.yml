version: 2

models:
  - name: orders
    description: "order tables"
    columns:
      - name: order_id
        data_type: varchar
        description: "id representing order"

      - name: customer_id
        data_type: number
        description: "id representing customer"

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""

      - name: store_id
        data_type: float
        description: ""

      - name: store_name
        data_type: varchar
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""

      - name: delivery_time_from_collection
        data_type: number
        description: ""
