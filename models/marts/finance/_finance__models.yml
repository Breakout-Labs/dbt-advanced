version: 2

models:
  - name: orders
    description: "One order per row"
    config:
      contract:
        enforced: true
    versions:
      - v: 1
    columns:
      - name: pk_orders
        data_type: varchar
        description: "Order id primary key"
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null

      - name: hk_customer
        data_type: varchar
        description: "Customer id primary key"

      - name: order_id
        data_type: varchar
        description: ""

      - name: customer_id
        data_type: number
        description: ""

      - name: ordered_at
        data_type: timestamp_ntz
        description: ""

      - name: order_status
        data_type: varchar
        description: ""

      - name: total_amount
        data_type: float
        description: ""
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000 
              strictly: true 

      - name: store_name
        data_type: varchar
        description: ""

      - name: delivery_time_from_order
        data_type: number
        description: ""
        tests:
          - greater_than_zero

      - name: delivery_time_from_collection
        data_type: number
        description: ""
        tests:
          - greater_than_zero

      - name: source_last_updated
        data_type: timestamp_ntz
        description: "Source last update time"

      - name: last_updated
        data_type: timestamp_ltz
        description: "Last update time"

      - name: days_since_last_order
        data_type: number

