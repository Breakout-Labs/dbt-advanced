version: 2

sources:
  - name: ecomm
    database: raw
    tables:
      - name: customers
        description: Each record in this table represents a customer in our ecommerce application.
        columns:
          - name: id
            description: '{{ doc("customer_id") }}'
      - name: orders
        description: "Each record in this table represents an order in our ecommerce application."
        columns:
          - name: pk_orders
            data_type: varchar
            description: "Unique primary key for each order"
            tests:
              - unique
              - not_null
          - name: hk_customer
            data_type: varchar
            description: "Foreign key for each unique customer"
          - name: order_id
            data_type: varchar
            description: "ID for each order"
          - name: customer_id
            data_type: number
            description: ""
          - name: ordered_at
            data_type: timestamp_ntz
            description: ""
          - name: order_status
            data_type: varchar
            description: ""
          - name: total_amount
            data_type: float
            description: ""
          - name: delivery_time_from_order
            data_type: number
            description: ""
          - name: delivery_time_from_collection
            data_type: number
            description: ""
          - name: days_since_last_order
            data_type: number
            description: ""
          - name: source_last_updated
            data_type: timestamp_ntz
            description: ""
          - name: last_updated
            data_type: timestamp_ltz
            description: ""
      - name: orders_us  
        description: Each record in this table represents an order in our ecommerce store in the US
      - name: orders_de
      - name: orders_au
      - name: deliveries
        description: Each record in this table represents an order delivery in our ecommerce application.

  - name: sheets
    database: raw
    tables:
      - name: customer_survey_responses

  - name: stripe
    database: raw
    tables:
      - name: payments