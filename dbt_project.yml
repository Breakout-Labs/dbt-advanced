name: 'dbt_training'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

models:
  +query_tag: 'dbt_course'
  dbt_training:
    +persist_docs:
      relation: true
      columns: true
    flags:
      require_generic_test_arguments_property: true
