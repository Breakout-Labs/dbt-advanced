name: 'dbt_training'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_training:
    +query_tag: dbt_course
    marts:
      orders:
        +snowflake_warehouse: "TRANSFORMING_S"
    ## elementary models will be created in the schema '<your_schema>_elementary'
    ## for details, see docs: <https://docs.elementary-data.com/>
    elementary:
    +schema: "elementary"
    #staging:
    #  +materialized: view
